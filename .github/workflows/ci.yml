name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      ZIG_VERSION: "0.15.2"
    steps:
      - uses: actions/checkout@v4

      - name: Cache Zig
        id: cache-zig
        uses: actions/cache@v4
        with:
          path: zig
          key: zig-${{ env.ZIG_VERSION }}-linux-x86_64

      - name: Download Zig
        if: steps.cache-zig.outputs.cache-hit != 'true'
        run: |
          curl -fsSL "https://ziglang.org/download/$ZIG_VERSION/zig-linux-x86_64-$ZIG_VERSION.tar.xz" -o zig.tar.xz
          mkdir -p zig
          tar xf zig.tar.xz -C zig --strip-components=1
          rm zig.tar.xz

      - name: Add Zig to PATH
        run: echo "$GITHUB_WORKSPACE/zig" >> $GITHUB_PATH

      - run: zig version

      - name: Build CLI (ReleaseFast)
        run: zig build cli -Doptimize=ReleaseFast

      - name: Build WASM modules
        run: zig build wasm wasm-shader -Doptimize=ReleaseFast

      - name: Run tests
        run: zig build test

  fmt:
    runs-on: ubuntu-latest
    env:
      ZIG_VERSION: "0.15.2"
    steps:
      - uses: actions/checkout@v4

      - name: Cache Zig
        id: cache-zig
        uses: actions/cache@v4
        with:
          path: zig
          key: zig-${{ env.ZIG_VERSION }}-linux-x86_64

      - name: Download Zig
        if: steps.cache-zig.outputs.cache-hit != 'true'
        run: |
          curl -fsSL "https://ziglang.org/download/$ZIG_VERSION/zig-linux-x86_64-$ZIG_VERSION.tar.xz" -o zig.tar.xz
          mkdir -p zig
          tar xf zig.tar.xz -C zig --strip-components=1
          rm zig.tar.xz

      - name: Add Zig to PATH
        run: echo "$GITHUB_WORKSPACE/zig" >> $GITHUB_PATH

      - name: Check formatting
        run: zig fmt --check src/ test/ BENCHMARK/ build.zig