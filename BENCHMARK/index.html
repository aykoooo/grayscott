<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gray-Scott GPU Benchmark — Multi-Run</title>
<style>
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    max-width: 960px;
    margin: 40px auto;
    padding: 24px;
    background: #111;
    color: #ddd;
  }
  h1 { color: #fff; font-size: 1.5em; margin-bottom: 8px; }
  .subtitle { color: #888; font-size: 0.85em; margin-bottom: 28px; }
  #status { margin: 16px 0; padding: 12px 16px; border-radius: 6px; background: #1a1a2e; color: #aaa; font-size: 0.9em; min-height: 1.2em; }
  #results { display: none; background: #1a1a2e; padding: 20px; border-radius: 6px; white-space: pre-wrap; font-size: 0.9em; line-height: 1.6; }
  .result-pass { color: #4caf50; }
  .result-fail { color: #f44336; }
  .metric { color: #64b5f6; font-weight: 600; }
  .speedup-good { color: #4caf50; font-weight: 700; }
  .speedup-bad { color: #f44336; }
  hr { border: none; border-top: 1px solid #333; margin: 20px 0; }
  button {
    background: #2a2a4a; color: #ccc; border: 1px solid #444; padding: 8px 20px;
    border-radius: 4px; cursor: pointer; font-size: 0.9em; margin-right: 8px;
  }
  button:hover { background: #3a3a5a; }
  table { border-collapse: collapse; width: 100%; margin: 8px 0; }
  th, td { text-align: right; padding: 4px 8px; }
  th { border-bottom: 1px solid #444; color: #888; font-weight: 500; }
  td { color: #ccc; }
</style>
</head>
<body>
<h1>Gray-Scott GPU Benchmark</h1>
<div class="subtitle">Multi-run browser WebGPU throughput &amp; hash validation</div>
<div id="status">Initializing...</div>
<div id="results"></div>

<script type="module">
const $ = (s) => document.querySelector(s);

// Native sacred hash (Naga) vs Browser sacred hash (Tint)
const SACRED_HASH_NATIVE = "e16ed0e3c29cc50b5fa2b42791f31ab00b39d488e971b5d3c6017970ed037a43";
const SACRED_HASH_BROWSER = "8a39d2abd3999ab73c34db2476849cddf303ce389b35826850f9a700589b4a90";
const W = 256, H = 256, STEPS = 500;
const PARAMS_BYTES = 20;
const NUM_RUNS = 3;

function setStatus(msg, isError) {
  const el = $("#status");
  el.textContent = msg;
  el.style.color = isError ? "#f44336" : "#aaa";
}

function showResults(text) {
  const el = $("#results");
  el.style.display = "block";
  el.innerHTML = text;
}

function readString(memory, ptr, len) {
  const buf = new Uint8Array(memory.buffer, ptr, len);
  return new TextDecoder().decode(buf);
}

function median(arr) {
  const sorted = [...arr].sort((a, b) => a - b);
  const mid = Math.floor(sorted.length / 2);
  return sorted.length % 2 !== 0 ? sorted[mid] : (sorted[mid - 1] + sorted[mid]) / 2;
}

async function main() {
  setStatus("Checking WebGPU support...");
  if (!navigator.gpu) {
    setStatus("WebGPU not available. Use Chrome 113+ or Edge 113+.", true);
    return;
  }

  setStatus("Requesting GPU adapter...");
  const adapter = await navigator.gpu.requestAdapter();
  if (!adapter) { setStatus("No GPU adapter found.", true); return; }

  const hasSubgroups = adapter.features.has("subgroups");
  const hasF16 = adapter.features.has("shader-f16");
  const features = [];
  if (hasSubgroups) features.push("subgroups");
  if (hasF16) features.push("shader-f16");

  setStatus(`Creating device (${features.join(", ") || "none"})...`);
  const device = await adapter.requestDevice({ requiredFeatures: features });
  const queue = device.queue;

  setStatus("Loading WASM module...");
  const wasmMod = await WebAssembly.instantiateStreaming(
    fetch("gray_scott_shader.wasm"), { env: {} }
  );
  const wasm = wasmMod.instance.exports;
  const memory = wasm.memory;

  const bufSize = wasm.gs_wasm_init_ptr(W, H);
  const dispatchX = wasm.gs_wasm_init_dispatch_x();
  const dispatchY = wasm.gs_wasm_init_dispatch_y();
  const tileX = wasm.gs_wasm_init_tile_x();
  const tileY = wasm.gs_wasm_init_tile_y();

  setStatus("Preparing init data...");
  const uInitBase = new Float32Array(W * H).fill(1.0);
  const vInitBase = new Float32Array(W * H).fill(0.0);
  const numSeeds = wasm.gs_wasm_generate_seeds(W, H);
  const cx = new Uint32Array(memory.buffer, wasm.gs_wasm_seed_cx(), numSeeds);
  const cy = new Uint32Array(memory.buffer, wasm.gs_wasm_seed_cy(), numSeeds);
  const sz = new Uint32Array(memory.buffer, wasm.gs_wasm_seed_sz(), numSeeds);
  for (let i = 0; i < numSeeds; i++) {
    const half = Math.floor(sz[i] / 2);
    const x0 = Math.max(0, cx[i] - half), x1 = Math.min(W, cx[i] + half);
    const y0 = Math.max(0, cy[i] - half), y1 = Math.min(H, cy[i] + half);
    for (let yy = y0; yy < y1; yy++) {
      for (let xx = x0; xx < x1; xx++) {
        uInitBase[yy * W + xx] = 0.5;
        vInitBase[yy * W + xx] = 1.0;
      }
    }
  }

  async function runOnce(variant, wgslSource) {
    const params = new Float32Array([1.0, 0.5, 1.0, 0.0545, 0.062]);
    const u0 = device.createBuffer({size: bufSize, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST | GPUBufferUsage.COPY_SRC});
    const v0 = device.createBuffer({size: bufSize, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST});
    const u1 = device.createBuffer({size: bufSize, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST});
    const v1 = device.createBuffer({size: bufSize, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST});
    const paramBuf = device.createBuffer({size: PARAMS_BYTES, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST});
    const readback = device.createBuffer({size: bufSize, usage: GPUBufferUsage.MAP_READ | GPUBufferUsage.COPY_DST});

    queue.writeBuffer(u0, 0, uInitBase);
    queue.writeBuffer(v0, 0, vInitBase);
    queue.writeBuffer(u1, 0, uInitBase);
    queue.writeBuffer(v1, 0, vInitBase);
    queue.writeBuffer(paramBuf, 0, params);

    const mod = device.createShaderModule({code: wgslSource});
    const pipeline = device.createComputePipeline({layout: "auto", compute: {module: mod, entryPoint: "main"}});
    const layout = pipeline.getBindGroupLayout(0);
    const bind0 = device.createBindGroup({layout, entries: [
      {binding: 0, resource: {buffer: u0}}, {binding: 1, resource: {buffer: v0}},
      {binding: 2, resource: {buffer: u1}}, {binding: 3, resource: {buffer: v1}},
      {binding: 4, resource: {buffer: paramBuf}},
    ]});
    const bind1 = device.createBindGroup({layout, entries: [
      {binding: 0, resource: {buffer: u1}}, {binding: 1, resource: {buffer: v1}},
      {binding: 2, resource: {buffer: u0}}, {binding: 3, resource: {buffer: v0}},
      {binding: 4, resource: {buffer: paramBuf}},
    ]});

    const marker = `${variant}-${performance.now()}`;
    performance.mark(`start-${marker}`);
    {
      const enc = device.createCommandEncoder();
      for (let step = 0; step < STEPS; step++) {
        const pass = enc.beginComputePass();
        pass.setPipeline(pipeline);
        pass.setBindGroup(0, step % 2 === 0 ? bind0 : bind1);
        pass.dispatchWorkgroups(dispatchX, dispatchY, 1);
        pass.end();
      }
      enc.copyBufferToBuffer(STEPS % 2 === 0 ? u0 : u1, 0, readback, 0, bufSize);
      queue.submit([enc.finish()]);
    }
    await queue.onSubmittedWorkDone();
    performance.mark(`end-${marker}`);
    performance.measure(`dur-${marker}`, `start-${marker}`, `end-${marker}`);
    const ms = performance.getEntriesByName(`dur-${marker}`)[0].duration;

    await readback.mapAsync(GPUMapMode.READ);
    const mapped = new Uint8Array(readback.getMappedRange());
    const hashBuf = mapped.slice(0);
    readback.unmap();

    const digest = await crypto.subtle.digest("SHA-256", hashBuf.buffer);
    const hash = Array.from(new Uint8Array(digest)).map(b => b.toString(16).padStart(2, "0")).join("");
    const cps = Math.round((W * H * STEPS) / (ms / 1000));

    u0.destroy(); v0.destroy(); u1.destroy(); v1.destroy();
    paramBuf.destroy(); readback.destroy();
    return {ms, cps, hash};
  }

  async function runVariant(name, src) {
    const runs = [];
    for (let i = 0; i < NUM_RUNS; i++) {
      setStatus(`${name}: run ${i + 1}/${NUM_RUNS}...`);
      runs.push(await runOnce(name, src));
      await new Promise(r => setTimeout(r, 200)); // cooldown between runs
    }
    return runs;
  }

  setStatus("Building standard WGSL...");
  let len = wasm.gs_wasm_build_standard_shader(W, H, tileX, tileY);
  const stdSrc = readString(memory, wasm.gs_wasm_shader_ptr(), len);
  const stdRuns = await runVariant("Standard", stdSrc);

  let subRuns = null;
  if (hasSubgroups) {
    setStatus("Building subgroups WGSL...");
    len = wasm.gs_wasm_build_subgroups_shader(W, H, tileX, tileY);
    const subSrc = readString(memory, wasm.gs_wasm_shader_ptr(), len);
    subRuns = await runVariant("Subgroups", subSrc);
  }

  const stdMedian = median(stdRuns.map(r => r.cps));
  const subMedian = subRuns ? median(subRuns.map(r => r.cps)) : null;
  const speedup = subMedian ? (subMedian / stdMedian).toFixed(2) : null;

  const fmtCps = (n) => `<span class="metric">${n.toLocaleString()} cells/sec</span>`;
  const fmtMs = (n) => `<span class="metric">${n.toFixed(1)} ms</span>`;

  function runTable(runs) {
    let html = `<table><tr><th>#</th><th>Time</th><th>Throughput</th><th>Hash</th></tr>`;
    for (let i = 0; i < runs.length; i++) {
      const r = runs[i];
      const hashMatch = r.hash === SACRED_HASH_BROWSER ? '<span class="result-pass">match</span>' : '<span class="result-fail">MISMATCH</span>';
      html += `<tr><td>${i + 1}</td><td>${r.ms.toFixed(1)} ms</td><td>${r.cps.toLocaleString()} c/s</td><td>${hashMatch}</td></tr>`;
    }
    html += `</table>`;
    return html;
  }

  let html = `<strong>Standard (${NUM_RUNS} runs)</strong>\n`;
  html += `  Tile: ${tileX}x${tileY}  Dispatch: ${dispatchX}x${dispatchY}\n`;
  html += runTable(stdRuns);
  html += `  <strong>Median throughput:</strong> ${fmtCps(stdMedian)}\n`;
  html += `  <strong>Median time:</strong> ${fmtMs(median(stdRuns.map(r => r.ms)))}\n`;
  html += `  <strong>Hash:</strong> <span class="metric">${stdRuns[0].hash}</span>\n`;
  html += `  <strong>Hash match:</strong> ${stdRuns[0].hash === SACRED_HASH_BROWSER ? '<span class="result-pass">BROWSER-SACRED</span>' : '<span class="result-fail">BROWSER-MISMATCH</span>'}\n`;

  if (subRuns) {
    html += `\n<strong>Subgroups (${NUM_RUNS} runs)</strong>\n`;
    html += runTable(subRuns);
    html += `  <strong>Median throughput:</strong> ${fmtCps(subMedian)}\n`;
    html += `  <strong>Median time:</strong> ${fmtMs(median(subRuns.map(r => r.ms)))}\n`;
    html += `  <strong>Speedup vs standard:</strong> <span class="speedup-good">${speedup}x</span>\n`;
  }

  html += `\n<strong>Environment</strong>\n`;
  html += `  GPU:  <span class="metric">${adapter.info?.vendor || "unknown"}</span>\n`;
  html += `  Features: ${features.join(", ") || "none"}\n`;

  setStatus("Benchmark complete.");
  showResults(html);
}

main().catch(err => {
  setStatus(`ERROR: ${err.message || err}`, true);
  console.error(err);
});
</script>
</body>
</html>
