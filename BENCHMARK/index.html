<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gray-Scott GPU Benchmark</title>
<style>
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    max-width: 860px;
    margin: 40px auto;
    padding: 24px;
    background: #111;
    color: #ddd;
  }
  h1 { color: #fff; font-size: 1.5em; margin-bottom: 8px; }
  .subtitle { color: #888; font-size: 0.85em; margin-bottom: 28px; }
  #status { margin: 16px 0; padding: 12px 16px; border-radius: 6px; background: #1a1a2e; color: #aaa; font-size: 0.9em; min-height: 1.2em; }
  #results { display: none; background: #1a1a2e; padding: 20px; border-radius: 6px; white-space: pre-wrap; font-size: 0.9em; line-height: 1.6; }
  .result-pass { color: #4caf50; }
  .result-fail { color: #f44336; }
  .metric { color: #64b5f6; font-weight: 600; }
  hr { border: none; border-top: 1px solid #333; margin: 20px 0; }
  button {
    background: #2a2a4a; color: #ccc; border: 1px solid #444; padding: 8px 20px;
    border-radius: 4px; cursor: pointer; font-size: 0.9em; margin-right: 8px;
  }
  button:hover { background: #3a3a5a; }
</style>
</head>
<body>
<h1>Gray-Scott GPU Benchmark</h1>
<div class="subtitle">nabla-type-lite engine — browser WebGPU throughput &amp; hash validation</div>
<div id="status">Initializing...</div>
<div id="results"></div>

<script type="module">
const $ = (s) => document.querySelector(s);

const SACRED_HASH = "e16ed0e3c29cc50b5fa2b42791f31ab00b39d488e971b5d3c6017970ed037a43";
const W = 256, H = 256, STEPS = 500;
const PARAMS_BYTES = 20;

function setStatus(msg, isError) {
  const el = $("#status");
  el.textContent = msg;
  el.style.color = isError ? "#f44336" : "#aaa";
}

function showResults(text) {
  const el = $("#results");
  el.style.display = "block";
  el.innerHTML = text;
}

function readString(memory, ptr, len) {
  const buf = new Uint8Array(memory.buffer, ptr, len);
  return new TextDecoder().decode(buf);
}

function formatHash(hex) {
  return `<span class="${hex === SACRED_HASH ? 'result-pass' : 'result-fail'}">${hex}</span>`;
}

async function main() {
  setStatus("Checking WebGPU support...");

  if (!navigator.gpu) {
    setStatus("WebGPU not available. Use Chrome 113+ or Edge 113+.", true);
    return;
  }

  setStatus("Requesting GPU adapter...");
  const adapter = await navigator.gpu.requestAdapter();
  if (!adapter) {
    setStatus("No GPU adapter found.", true);
    return;
  }

  const hasSubgroups = adapter.features.has("subgroups");
  const hasF16 = adapter.features.has("shader-f16");

  const requiredFeatures = [];
  if (hasSubgroups) requiredFeatures.push("subgroups");
  if (hasF16) requiredFeatures.push("shader-f16");

  setStatus(`Creating device (subgroups=${hasSubgroups}, shader-f16=${hasF16})...`);
  const device = await adapter.requestDevice({ requiredFeatures });
  const queue = device.queue;

  setStatus("Loading WASM module...");
  const wasmModule = await WebAssembly.instantiateStreaming(
    fetch("gray_scott_shader.wasm"),
    { env: {} }
  );
  const wasm = wasmModule.instance.exports;
  const memory = wasm.memory;

  const info = wasm.gs_wasm_init(W, H);
  const bufSize = info.buffer_size;
  const dispatchX = info.dispatch_x;
  const dispatchY = info.dispatch_y;
  const tileX = info.tile_x;
  const tileY = info.tile_y;

  setStatus(`Grid ${W}x${H}, tile ${tileX}x${tileY}, dispatch ${dispatchX}x${dispatchY}...`);

  let shaderResult, variantName;
  if (hasSubgroups) {
    shaderResult = wasm.gs_wasm_build_subgroups(W, H, tileX, tileY);
    variantName = "subgroups";
  } else {
    shaderResult = wasm.gs_wasm_build_periodic(W, H, tileX, tileY);
    variantName = "standard";
  }

  const wgslSource = readString(memory, shaderResult.ptr, shaderResult.len);

  const shaderModule = device.createShaderModule({ code: wgslSource });
  const pipeline = device.createComputePipeline({
    layout: "auto",
    compute: { module: shaderModule, entryPoint: "main" },
  });

  setStatus("Generating seed patterns...");

  const uInit = new Float32Array(W * H).fill(1.0);
  const vInit = new Float32Array(W * H).fill(0.0);

  const numSeeds = wasm.gs_wasm_generate_seeds(W, H);
  const cxPtr = wasm.gs_wasm_seed_cx();
  const cyPtr = wasm.gs_wasm_seed_cy();
  const szPtr = wasm.gs_wasm_seed_sz();

  const cx = new Uint32Array(memory.buffer, cxPtr, numSeeds);
  const cy = new Uint32Array(memory.buffer, cyPtr, numSeeds);
  const sz = new Uint32Array(memory.buffer, szPtr, numSeeds);

  for (let i = 0; i < numSeeds; i++) {
    const half = Math.floor(sz[i] / 2);
    const x0 = Math.max(0, cx[i] - half);
    const x1 = Math.min(W, cx[i] + half);
    const y0 = Math.max(0, cy[i] - half);
    const y1 = Math.min(H, cy[i] + half);
    for (let yy = y0; yy < y1; yy++) {
      for (let xx = x0; xx < x1; xx++) {
        const idx = yy * W + xx;
        uInit[idx] = 0.5;
        vInit[idx] = 1.0;
      }
    }
  }

  const u0 = device.createBuffer({
    size: bufSize,
    usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST | GPUBufferUsage.COPY_SRC,
  });
  const v0 = device.createBuffer({
    size: bufSize,
    usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST,
  });
  const u1 = device.createBuffer({
    size: bufSize,
    usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST,
  });
  const v1 = device.createBuffer({
    size: bufSize,
    usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST,
  });

  const paramBuf = device.createBuffer({
    size: PARAMS_BYTES,
    usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST,
  });

  queue.writeBuffer(u0, 0, uInit);
  queue.writeBuffer(v0, 0, vInit);
  queue.writeBuffer(u1, 0, uInit);
  queue.writeBuffer(v1, 0, vInit);

  const params = new Float32Array([1.0, 0.5, 1.0, 0.0545, 0.062]);
  queue.writeBuffer(paramBuf, 0, params);

  const bgLayout = pipeline.getBindGroupLayout(0);

  const bindGrip0 = device.createBindGroup({
    layout: bgLayout,
    entries: [
      { binding: 0, resource: { buffer: u0 } },
      { binding: 1, resource: { buffer: v0 } },
      { binding: 2, resource: { buffer: u1 } },
      { binding: 3, resource: { buffer: v1 } },
      { binding: 4, resource: { buffer: paramBuf } },
    ],
  });

  const bindGrip1 = device.createBindGroup({
    layout: bgLayout,
    entries: [
      { binding: 0, resource: { buffer: u1 } },
      { binding: 1, resource: { buffer: v1 } },
      { binding: 2, resource: { buffer: u0 } },
      { binding: 3, resource: { buffer: v0 } },
      { binding: 4, resource: { buffer: paramBuf } },
    ],
  });

  const readbackBuf = device.createBuffer({
    size: bufSize,
    usage: GPUBufferUsage.MAP_READ | GPUBufferUsage.COPY_DST,
  });

  setStatus(`Running ${STEPS} steps (variant: ${variantName})...`);

  performance.mark("bench-start");
  {
    const encoder = device.createCommandEncoder();
    for (let step = 0; step < STEPS; step++) {
      const bg = step % 2 === 0 ? bindGrip0 : bindGrip1;
      const pass = encoder.beginComputePass();
      pass.setPipeline(pipeline);
      pass.setBindGroup(0, bg);
      pass.dispatchWorkgroups(dispatchX, dispatchY, 1);
      pass.end();
    }
    const lastStep = STEPS - 1;
    const srcBuf = lastStep % 2 === 0 ? u1 : u0;
    encoder.copyBufferToBuffer(srcBuf, 0, readbackBuf, 0, bufSize);
    queue.submit([encoder.finish()]);
  }

  await queue.onSubmittedWorkDone();
  performance.mark("bench-end");
  performance.measure("bench-duration", "bench-start", "bench-end");
  const elapsedMs = performance.getEntriesByName("bench-duration")[0].duration;

  setStatus("Reading back results...");
  await readbackBuf.mapAsync(GPUMapMode.READ);
  const mapped = new Uint8Array(readbackBuf.getMappedRange());
  const hashBuf = mapped.slice(0);
  readbackBuf.unmap();

  const hashArrayBuf = hashBuf.buffer;
  const digest = await crypto.subtle.digest("SHA-256", hashArrayBuf);
  const hashHex = Array.from(new Uint8Array(digest))
    .map(b => b.toString(16).padStart(2, "0"))
    .join("");

  const cellsPerSec = Math.round((W * H * STEPS) / (elapsedMs / 1000));

  const hashMatch = hashHex === SACRED_HASH;

  let resultHtml = `<strong>Result</strong>\n`;
  resultHtml += `  Resolution:     <span class="metric">${W}x${H}</span>\n`;
  resultHtml += `  Steps:          <span class="metric">${STEPS}</span>\n`;
  resultHtml += `  Tile:           <span class="metric">${tileX}x${tileY}</span>\n`;
  resultHtml += `  Dispatch:       <span class="metric">${dispatchX}x${dispatchY}</span>\n`;
  resultHtml += `  Variant:        <span class="metric">${variantName}</span>\n`;
  resultHtml += `  Subgroups:      <span class="metric">${hasSubgroups}</span>\n`;
  resultHtml += `  Shader-f16:     <span class="metric">${hasF16}</span>\n`;
  resultHtml += `  GPU time:       <span class="metric">${elapsedMs.toFixed(1)} ms</span>\n`;
  resultHtml += `  Throughput:     <span class="metric">${cellsPerSec.toLocaleString()} cells/sec</span>\n`;
  resultHtml += `\n`;
  resultHtml += `  Hash:           ${formatHash(hashHex)}\n`;
  resultHtml += `  Expected:       <span class="result-pass">${SACRED_HASH}</span>\n`;
  resultHtml += `  Match:          ${hashMatch ? '<span class="result-pass">YES</span>' : '<span class="result-fail">NO</span>'}\n`;

  setStatus(hashMatch ? "Benchmark complete — hash matches!" : "Benchmark complete — hash MISMATCH!", !hashMatch);
  showResults(resultHtml);
}

main().catch(err => {
  setStatus(`ERROR: ${err.message || err}`, true);
  console.error(err);
});
</script>
</body>
</html>
